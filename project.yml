name: SnippetMini
options:
  bundleIdPrefix: com.yamaguchidesign
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 4G5JHTY4LY
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: SnippetMini/SnippetMini.entitlements
    ENABLE_HARDENED_RUNTIME: YES
targets:
  SnippetMini:
    type: application
    platform: macOS
    sources:
      - path: SnippetMini
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamaguchidesign.snippet-mini
        INFOPLIST_FILE: SnippetMini/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: SnippetMini/SnippetMini.entitlements
